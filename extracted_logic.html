      }

      // --- GENERACIÓN DE REPORTES Y PUESTOS ---
      async function generarReporteIndividual(forcedZipId = null) {
        const sId = forcedZipId || $('rep-estudiante').value;
        if (!sId) return;

        // Prioridad: Usar el zipgrade_id oficial si existe en el maestro
        const isStudentMode = !!localStorage.getItem('studentId');
        const officialZipId = localStorage.getItem('studentZipId');
        const zipId = (isStudentMode && officialZipId) ? officialZipId : sId;

        showLoading(true);
        try {
          const [resHistNotas, resTodosNotas, resHistComp, resTodosComp] = await Promise.all([
            supabaseClient.from('eval_estudiantes_notas').select('*').or(`zipgrade_id.eq.${zipId},zipgrade_id.ilike.%${zipId}%`).order('periodo', { ascending: true }),
            supabaseClient.from('eval_estudiantes_notas').select('*').eq('periodo', currentPeriodo),
            supabaseClient.from('eval_estudiantes_completos').select('*').or(`student_id.eq.${zipId},student_id.ilike.%${zipId}%`).order('periodo', { ascending: true }),
            supabaseClient.from('eval_estudiantes_completos').select('*').eq('periodo', currentPeriodo)
          ]);

          const normComp = (list) => (list || []).map(d => {
            const nr = {};
            if (d.respuestas) Object.keys(d.respuestas).forEach(q => { nr[q] = d.respuestas[q].pts >= 1 ? 1 : 0; });
            return { zipgrade_id: d.student_id, estudiante_nombre: d.estudiante_nombre, respuestas: nr, porcentaje: d.percent_correct, periodo: d.periodo, grado: d.grado };
          });

          const historicoData = [...(resHistNotas.data || []), ...normComp(resHistComp.data)].sort((a, b) => a.periodo - b.periodo);
          const todosData = [...(resTodosNotas.data || []), ...normComp(resTodosComp.data)];

          // Deduplicar historico por zipgrade_id + periodo
          const histMap = new Map();
          historicoData.forEach(t => histMap.set(`${t.zipgrade_id}_${t.periodo}`, t));
          const historico = Array.from(histMap.values());

          // Deduplicar todos por zipgrade_id
          const todosMap = new Map();
          todosData.forEach(t => todosMap.set(t.zipgrade_id.toString().trim(), t));
          const todos = Array.from(todosMap.values());

          // NO usar fallback por nombre para evitar confusiones entre estudiantes con apellidos iguales.
          // El sistema ahora es 100% basado en el Número de Identificación para garantizar privacidad.
          if (historico.length === 0 && isStudentMode) {
            // Si llegamos aquí, el ID no está en la base de notas.
          }

          const est = historico.find(t => t.periodo === parseInt(currentPeriodo)) || historico[historico.length - 1];
          if (!est) {
            $('reporte-content').innerHTML = `
             <div style="text-align:center; padding:3rem; color:#64748b;">
               <img src="https://cdn-icons-png.flaticon.com/512/1175/1175510.png" style="width:80px; opacity:0.3; margin-bottom:1rem;">
               <p style="font-weight:700; font-size:1.1rem;">Aún no tienes resultados cargados</p>
               <p style="font-size:0.85rem;">Espera a que tus docentes suban las notas del periodo ${currentPeriodo === 3 ? 'Final' : currentPeriodo}.</p>
             </div>
           `;
            showLoading(false);
            return;
          }

          const actualZipId = est.zipgrade_id.toString().trim();
          const actualPeriodoNum = parseInt(est.periodo);
          const grupoEst = est.grado ? est.grado.toString().trim() : extraerGrupo(actualZipId);

          const estudiantesGrupo = todos.filter(t => {
            if (parseInt(t.periodo) !== actualPeriodoNum) return false;
            const g = t.grado ? t.grado.toString().trim() : extraerGrupo(t.zipgrade_id);
            return g === grupoEst;
          });

          const gradoBase = extraerGradoBase(grupoEst);
          const estudiantesNivel = todos.filter(t => {
            if (parseInt(t.periodo) !== actualPeriodoNum) return false;
            const g = t.grado ? t.grado.toString().trim() : extraerGrupo(t.zipgrade_id);
            return extraerGradoBase(g) === gradoBase;
          });

          const sortedGrupo = [...estudiantesGrupo].sort((a, b) => (b.porcentaje || 0) - (a.porcentaje || 0));
          const idxG = sortedGrupo.findIndex(t => t.zipgrade_id.toString().trim() === actualZipId);
          const puestoGrupo = idxG >= 0 ? idxG + 1 : "-";

          const sortedNivel = [...estudiantesNivel].sort((a, b) => (b.porcentaje || 0) - (a.porcentaje || 0));
          const idxN = sortedNivel.findIndex(t => t.zipgrade_id.toString().trim() === actualZipId);
          const puestoNivelFinal = idxN >= 0 ? idxN + 1 : "-";

          const gNum = extraerGradoBase(grupoEst);
          let mKey = '6-9';
          if (gNum <= 4) mKey = '3-4';
          else if (gNum === 5) mKey = '5';
          else if (gNum >= 10) mKey = '10-11';
          const config = MATRIZ_RANGOS[mKey];

          // Calcular puestos por cada asignatura (DENTRO DEL GRUPO)
          const puestosMaterias = {};
          config.forEach(subj => {
            const rankings = estudiantesGrupo.map(student => {
              let ok = 0;
              for (let i = subj.start; i <= subj.end; i++) {
                if (student.respuestas && student.respuestas[i] === 1) ok++;
              }
              return { id: student.zipgrade_id, ok, promedioGlobal: student.porcentaje || 0 };
            }).sort((a, b) => {
              if (b.ok !== a.ok) return b.ok - a.ok;
              return b.promedioGlobal - a.promedioGlobal; // Tie-breaker: promedio global
            });

            puestosMaterias[subj.label] = rankings.findIndex(r => r.id.toString().trim() === actualZipId) + 1;
          });

          const html = construirHTMLBoletin(est, puestoGrupo, estudiantesGrupo.length, puestosMaterias, config, historico, puestoNivelFinal, estudiantesNivel.length);

          const printActions = `
          <div class="no-print" style="margin-bottom:1rem; display:flex; gap:10px; justify-content: flex-end;">
            <button onclick="window.print()" style="background:#4f46e5; color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:700; cursor:pointer;">🖨️ IMPRIMIR ESTE REPORTE</button>
            <button onclick="imprimirTodoElGrado()" class="admin-only" style="background:#10b981; color:white; border:none; padding:10px 20px; border-radius:12px; font-weight:700; cursor:pointer;">📋 IMPRIMIR TODO EL GRADO</button>
          </div>
        `;

          $('reporte-content').innerHTML = `
          ${printActions}
          <div id="report-print-area">${html}</div>
        `;

          // Forzar a MathJax a procesar el reporte individual
          if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
          }

          // Renderizar gráfico comparativo después de inyectar el HTML
          if (historico && historico.length > 0) {
            setTimeout(() => renderizarGraficoTendencia(historico), 100);
          }
        } catch (e) {
          console.error("Error generando reporte:", e);
          alert("Hubo un problema al generar el reporte: " + e.message);
          $('reporte-content').innerHTML = `<p style="text-align:center; color:#ef4444; padding:2rem;">❌ Error: ${e.message}</p>`;
        } finally {
          showLoading(false);
        }
      }

      function renderizarGraficoTendencia(historico) {
        if (!historico || historico.length < 1) return;
        const est = historico[0];
        const ctx = document.getElementById(`chart-tendencia-${est.zipgrade_id}`);
        if (!ctx) return;

        // Filtrar solo hasta el periodo actual
        const curP = parseInt(currentPeriodo) || 1;
        const histFiltrado = historico.filter(h => h.periodo <= curP).sort((a, b) => a.periodo - b.periodo);
        if (histFiltrado.length < 1) return;

        const labels = histFiltrado.map(h => h.periodo === 3 ? 'EF' : 'E' + h.periodo);
        const data = histFiltrado.map(h => Math.round(h.porcentaje));
        const colors = histFiltrado.map(h => getValoration(Math.round(h.porcentaje)).color);

        new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Promedio',
              data: data,
              borderColor: '#4f46e5',
              backgroundColor: 'rgba(79, 70, 229, 0.1)',
              pointBackgroundColor: colors,
              pointBorderColor: '#fff',
              pointBorderWidth: 1,
              pointRadius: 4,
              borderWidth: 2,
              tension: 0.3,
              fill: true
            }]
          },
          options: {
            responsive: true
          }
        });
      }

      async function cargarGruposInformeGrupal() {
        showLoading(true);
        try {
          // Consultar solo Notas para asegurar la consistencia sin duplicados
          const { data: resNotas } = await supabaseClient.from('eval_estudiantes_notas').select('grado').eq('periodo', currentPeriodo);

          const groupsNotas = resNotas ? resNotas.map(d => d.grado.toString()) : [];
          let uniqueGroups = [...new Set(groupsNotas)].filter(esGrupoValido);

          if (currentRole !== 'superadmin') {
            const assignedLower = (window.assignedGrade || "").toString().toLowerCase();
            const gBaseAssigned = extraerGradoBase(window.assignedGrade);
            const esDePrimaria = assignedLower === "primaria" || (gBaseAssigned >= 1 && gBaseAssigned <= 5);
            const mySede = window.userSede || 'Central';

            if (currentRole === 'admin') {
              uniqueGroups = uniqueGroups.filter(g => detectarSede(g).toUpperCase() === mySede.toUpperCase());
              if (esDePrimaria && mySede.toUpperCase() === 'CENTRAL') {
                uniqueGroups = uniqueGroups.filter(g => ['301', '401', '501'].includes(g.toString()));
              }
            } else {
              // Lectores (Directores de Grupo): Solo ven sus grupos asignados
              const direccion = window.assignedGroups || [];
              uniqueGroups = uniqueGroups.filter(g => {
                const gBase = extraerGradoBase(g);
                return direccion.some(d => d === g.toString() || d === gBase.toString());
              });

              // RESTRICCIÓN ADICIONAL CENTRAL PRIMARIA
              if (esDePrimaria && mySede.toUpperCase() === 'CENTRAL') {
                uniqueGroups = uniqueGroups.filter(g => ['301', '401', '501'].includes(g.toString()));
              }
            }
          }

          uniqueGroups.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          const sel = $('gru-sel-grado');
          sel.innerHTML = '<option value="">Seleccione grupo...</option>' + uniqueGroups.map(g => `<option value="${g}">${g}</option>`).join('');
        } catch (e) { console.error("Error en cargarGruposInformeGrupal:", e); }
        showLoading(false);
      }

      async function generarInformeGrupal() {
        const grupo = $('gru-sel-grado').value;

        showLoading(true);
        try {
          const { data: todosData, error } = await supabaseClient.from('eval_estudiantes_notas').select('*').eq('periodo', currentPeriodo);
          if (error) throw error;

          const estudiantesGrupo = (todosData || []).filter(t => {
            const g = t.grado ? t.grado.toString().trim() : extraerGrupo(t.zipgrade_id);
            return g === grupo;
          }).sort((a, b) => a.estudiante_nombre.localeCompare(b.estudiante_nombre, 'es', { sensitivity: 'base' }));

          if (estudiantesGrupo.length === 0) {
            $('grupal-content').innerHTML = '<p style="text-align:center; padding:2rem;">No hay datos.</p>';
            showLoading(false);
            return;
          }

          const gNum = extraerGradoBase(grupo);
          let mKey = '6-9';
          if (gNum <= 4) mKey = '3-4'; else if (gNum === 5) mKey = '5'; else if (gNum >= 10) mKey = '10-11';
          let config = MATRIZ_RANGOS[mKey];

          let profesMap = {};
          try {
            const { data: profesData } = await supabaseClient.from('docentes_privacidad')
              .select('asignatura, nombre')
              .eq('tipo', 'ASIGNACION')
              .or(`grado.eq.${grupo},grado.eq.${gNum}`);
            if (profesData) {
              profesData.forEach(p => {
                const normAsig = (p.asignatura || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
                profesMap[normAsig] = p.nombre;
              });
            }
          } catch(e) { console.error("Error fetching profes:", e); }

          let html = `<table style="width:100%; border-collapse:separate; border-spacing:0; font-size:0.85rem;">
            <thead style="position:sticky; top:0; z-index:99; background:white;">
              <tr><th style="padding:12px 8px; text-align:left; position:sticky; left:0; background:white; z-index:100; min-width:180px; border-bottom:2px solid #e2e8f0; box-shadow: 0 4px 6px -2px rgba(0,0,0,0.1);">ESTUDIANTE</th>
              ${config.map(s => {
                const normLabel = s.label.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
                let doc = profesMap[normLabel] || "";
                if (!doc && (normLabel === "BIOLOGIA" || normLabel.includes("NATURALES"))) doc = profesMap["CIENCIAS NATURALES"] || profesMap["BIOLOGIA"] || "";
                if (!doc && (normLabel === "SOCIALES" || normLabel.includes("SOCIALES"))) doc = profesMap["CIENCIAS SOCIALES"] || profesMap["SOCIALES"] || "";
                if (!doc && (normLabel.includes("COMPETENCIAS") || normLabel.includes("CIUDADANAS"))) doc = profesMap["COMPETENCIAS CIUDADANAS"] || profesMap["CIUDADANAS"] || "";
                if (!doc && (normLabel.includes("MATEMATICA"))) doc = profesMap["MATEMATICAS"] || profesMap["CALCULO"] || profesMap["TRIGONOMETRIA"] || "";
                if (!doc) doc = "Por asignar";
                
                const partes = doc.split(' ').filter(x => x.trim().length > 0);
                const docCorto = partes.length >= 2 ? partes[0] + ' ' + partes[1] : doc;

                return `<th style="padding:12px 4px; text-align:center; min-width:60px; font-size:0.75rem; color:#1e293b; border-bottom:2px solid #e2e8f0; position:sticky; top:0; background:white; z-index:99; box-shadow: 0 4px 6px -2px rgba(0,0,0,0.1);">
                          <div style="margin-bottom:2px;">${s.label}</div>
                          <div style="font-size:0.55rem; color:#64748b; font-weight:700; max-width:60px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin:0 auto;" title="${doc}">${docCorto}</div>
                        </th>`;
              }).join('')}
              <th style="padding:12px 8px; text-align:center; min-width:70px; background:white; border-bottom:2px solid #e2e8f0; position:sticky; top:0; z-index:99; box-shadow: 0 4px 6px -2px rgba(0,0,0,0.1);">PROM.</th></tr>
            </thead><tbody>`;

          estudiantesGrupo.forEach(est => {
            let sumaPct = 0;
            html += `<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:10px 12px; font-weight:700; position:sticky; left:0; background:white; border-right:1px solid #f1f5f9; white-space:nowrap; z-index:5;">${est.estudiante_nombre}</td>`;
            config.forEach(subj => {
              let ok = 0, totalSub = 0;
              for (let i = subj.start; i <= subj.end; i++) { totalSub++; if (est.respuestas && est.respuestas[i] === 1) ok++; }
              const pct = Math.round((ok / totalSub) * 100); sumaPct += pct; const val = getValoration(pct);
              html += `<td style="padding:4px; text-align:center;"><div class="val-box" style="background:${val.color}; color:${val.color === '#facc15' ? '#1e293b' : 'white'};">${val.initial}</div></td>`;
            });
            const prom = Math.round(sumaPct / config.length); const valGen = getValoration(prom);
            html += `<td style="padding:8px; text-align:center; background:#f0f9ff; font-weight:900; color:${valGen.color};">${prom}</td></tr>`;
          });
          html += `</tbody></table>`;
          $('grupal-content').innerHTML = html;
        } catch (e) { console.error(e); }
        showLoading(false);
      }

          const groupsNotas = resNotas ? resNotas.map(d => d.grado.toString()) : [];
          let uniqueGroups = [...new Set(groupsNotas)].filter(esGrupoValido);

          if (currentRole !== 'superadmin') {
            const assignedLower = (window.assignedGrade || "").toString().toLowerCase();
            const gBaseAssigned = extraerGradoBase(window.assignedGrade);
            const esDePrimaria = assignedLower === "primaria" || (gBaseAssigned >= 1 && gBaseAssigned <= 5);
            const mySede = window.userSede || 'Central';

            if (currentRole === 'admin') {
              // Administradores de Sede: Solo ven grupos de su propia sede
              uniqueGroups = uniqueGroups.filter(g => detectarSede(g).toUpperCase() === mySede.toUpperCase());
              if (esDePrimaria && mySede.toUpperCase() === 'CENTRAL') {
                uniqueGroups = uniqueGroups.filter(g => ['301', '401', '501'].includes(g.toString()));
              }
            } else {
              // Lectores (Docentes)
              const direccion = window.assignedGroups || [];
              const dictan = userPermissions
                .filter(p => p.tipo === 'ASIGNACION' && isSubjectEvaluated(p.asignatura, p.grado))
                .map(p => p.grado.toString());

              const allowedPool = [...new Set([...direccion, ...dictan])];
              uniqueGroups = uniqueGroups.filter(g => {
                const gBase = extraerGradoBase(g);
                const hasPermission = allowedPool.some(ap => ap === g.toString() || ap === gBase.toString());
                
                // RESTRICCIÓN ADICIONAL CENTRAL PRIMARIA
                if (esDePrimaria && mySede.toUpperCase() === 'CENTRAL') {
                   return ['301', '401', '501'].includes(g.toString());
                }
                return hasPermission;
              });
            }
          }

          uniqueGroups.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
          const sel = $('asig-sel-grado');
          sel.innerHTML = '<option value="">Seleccione grupo...</option>' + uniqueGroups.map(g => `<option value="${g}">${g}</option>`).join('');
          $('asig-sel-materia').innerHTML = '<option value="">Seleccione grupo primero...</option>';
        } catch (e) { console.error(e); }
        showLoading(false);
      }

          $('asignatura-content').innerHTML = '<p style="text-align:center; color:#64748b; padding:3rem;">Seleccione un grupo y una asignatura para ver el detalle.</p>';
          return;
        }

        showLoading(true);
        try {
          const { data: todosData, error } = await supabaseClient.from('eval_estudiantes_notas').select('*').eq('periodo', currentPeriodo);
          if (error) throw error;

          const estudiantesGrupo = (todosData || []).filter(t => {
            const g = t.grado ? t.grado.toString().trim() : extraerGrupo(t.zipgrade_id);
            return g === grupo;
          }).sort((a, b) => a.estudiante_nombre.localeCompare(b.estudiante_nombre, 'es', { sensitivity: 'base' }));

          if (estudiantesGrupo.length === 0) {
            $('asignatura-content').innerHTML = '<p style="text-align:center; padding:2rem;">No hay datos.</p>';
            showLoading(false); return;
          }

          const gNum = extraerGradoBase(grupo);
          let mKey = '6-9';
          if (gNum <= 4) mKey = '3-4'; else if (gNum === 5) mKey = '5'; else if (gNum >= 10) mKey = '10-11';
          const configFull = MATRIZ_RANGOS[mKey];

          // Mapeo de materias seleccionadas
          let config = [];
          if (materiaFiltro === 'Naturales' || (gNum < 10 && materiaFiltro === 'Biología')) {
            if (gNum >= 10) {
              config = configFull.filter(c => ['Biología', 'Física', 'Química'].includes(c.label));
            } else {
              // En 3-9, Biología es el nuevo nombre de Ciencias Naturales
              config = configFull.filter(c => c.label === 'Biología' || c.label.includes('Naturales'));
            }
          } else {
            config = configFull.filter(c => c.label.includes(materiaFiltro));
          }

          if (config.length === 0) {
            $('asignatura-content').innerHTML = `<p style="text-align:center; padding:2rem;">La asignatura "${materiaFiltro}" no está definida para este grado.</p>`;

            'Competencias Ciudadanas': 'Competencias',
            'Ciudadanas': 'Competencias',

            'Sociales': 'Sociales',
            'Ciencias Naturales': 'Biología',

                            ${config.map(s => {
            const displayLabel = (labelsMap[s.label] || s.label).toUpperCase();

          }).join('')}
                            <th class="promedio-col-base" style="padding:10px; text-align:center; font-weight:800; background:#f0f9ff; position:sticky; top:0; border-bottom:2px solid #e2e8f0;">PROM.</th>
                        </tr>
                    </thead>
                    <tbody style="z-index:1;">
            `;

          estudiantesGrupo.forEach(est => {
            let sumaPct = 0;
            html += `<tr style="border-bottom:1px solid #f1f5f9;">
                    <td class="estudiante-col-base" style="padding:10px 12px; font-weight:700; position:sticky; left:0; background:white; white-space:nowrap; z-index:5;">${est.estudiante_nombre}</td>`;

              for (let i = subj.start; i <= subj.end; i++) {

                if (est.respuestas && est.respuestas[i] === 1) ok++;
              }
              const pct = Math.round((ok / totalSub) * 100);
              sumaPct += pct;
              const val = getValoration(pct);
              html += `<td class="subject-col-base" style="padding:8px; text-align:center;">

                    </td>`;

            const prom = Math.round(sumaPct / config.length);
            const valGen = getValoration(prom);
            html += `<td class="promedio-col-base" title="${prom}" style="padding:8px; text-align:center; background:#f0f9ff; font-weight:900; color:${valGen.color}; cursor:help;">${prom}</td></tr>`;

          // Resumen Grupal
          html += `<tr style="background:#f8fafc; font-weight:800; border-top:2px solid #e2e8f0;">
                <td class="estudiante-col-base" style="padding:12px; position:sticky; left:0; background:#f8fafc;">PROMEDIO GRUPAL</td>`;
          let totalGeneral = 0;
          config.forEach(subj => {
            let sumaSub = 0;
            estudiantesGrupo.forEach(est => {
              let ok = 0, totalSub = 0;
              for (let i = subj.start; i <= subj.end; i++) { totalSub++; if (est.respuestas && est.respuestas[i] === 1) ok++; }
              sumaSub += Math.round((ok / totalSub) * 100);

            const promSub = Math.round(sumaSub / estudiantesGrupo.length);
            totalGeneral += promSub;
            html += `<td class="subject-col-base" style="padding:12px; text-align:center;">${promSub}</td>`;

          html += `<td class="promedio-col-base" style="padding:12px; text-align:center; background:#e0f2fe; color:#0369a1; font-size:1.1rem;">${Math.round(totalGeneral / config.length)}</td></tr>
                </tbody></table>`;

          $('asignatura-content').innerHTML = html;
        } catch (e) { console.error(e); }
        showLoading(false);
      }

                        }
                      });

                window.onload = () => {
                  initCharts();
                  setTimeout(() => window.print(), 1000);
                };
              ${sEnd}
            </body>
          </html>
        `);

        showLoading(true);
        try {
          const { data: todosData, error } = await supabaseClient.from('eval_estudiantes_notas')
            .select('*')
            .order('periodo', { ascending: true });

          if (error) throw error;

          // 1. Filtrar estudiantes de la sede y rango seleccionado
          const estudiantesSede = todosData.filter(t => {
            if (t.periodo !== parseInt(currentPeriodo)) return false;
            if (detectarSede(extraerGrupo(t.zipgrade_id)) !== sede) return false;
            const g = extraerGradoBase(extraerGrupo(t.zipgrade_id));
            if (rango === 'basica') return g >= 3 && g <= 9;
            if (rango === 'superior') return g >= 10;
            return true;
          });

          if (estudiantesSede.length === 0) {
            showLoading(false);
            return alert(`No hay datos para el rango ${desc} en la sede "${sede}".`);
          }

          // 2. Agrupar por grupo para calcular puestos
          const gruposMap = {};
          estudiantesSede.forEach(a => {
            const g = extraerGrupo(a.zipgrade_id);
            if (!gruposMap[g]) gruposMap[g] = [];
            gruposMap[g].push(a);
          });

          const historicosMap = {};
          const reportesHtml = [];
          const gruposOrdenados = Object.keys(gruposMap).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

          for (const grupo of gruposOrdenados) {
            const estudiantesGrupo = gruposMap[grupo];
            const gNum = extraerGradoBase(grupo);
            const estudiantesNivel = todosData.filter(t => t.periodo === parseInt(currentPeriodo) && extraerGradoBase(extraerGrupo(t.zipgrade_id)) === gNum);
            const sortedNivel = [...estudiantesNivel].sort((a, b) => (b.porcentaje || 0) - (a.porcentaje || 0));

            let mKey = '6-9';
            if (gNum <= 4) mKey = '3-4';
            else if (gNum === 5) mKey = '5';
            else if (gNum >= 10) mKey = '10-11';
            const config = MATRIZ_RANGOS[mKey];
            const isSuperior = gNum >= 10;

            const sortedGrupoParaPuesto = [...estudiantesGrupo].sort((a, b) => (b.porcentaje || 0) - (a.porcentaje || 0));
            const rankingsGrupo = estudiantesGrupo.sort((a, b) => a.estudiante_nombre.localeCompare(b.estudiante_nombre, 'es', { sensitivity: 'base' }));

            rankingsGrupo.forEach((est, idxRank) => {
              const zId = est.zipgrade_id.toString();
              const isSuperior = zId.startsWith("10") || zId.startsWith("11");
              const puestosMaterias = {};
              config.forEach(subj => {
                const subjRank = estudiantesGrupo.map(student => {
                  let ok = 0;
                  for (let q = subj.start; q <= subj.end; q++) { if (student.respuestas && student.respuestas[q] === 1) ok++; }
                  return { id: student.zipgrade_id, ok, promedioGlobal: student.porcentaje || 0 };
                }).sort((a, b) => {
                  if (b.ok !== a.ok) return b.ok - a.ok;
                  return b.promedioGlobal - a.promedioGlobal;
                });
                puestosMaterias[subj.label] = subjRank.findIndex(r => r.id === est.zipgrade_id) + 1;
              });

              historicosMap[est.zipgrade_id] = todosData.filter(t => t.zipgrade_id === est.zipgrade_id).sort((x, y) => x.periodo - y.periodo);
              const puestoGrupo = sortedGrupoParaPuesto.findIndex(t => t.zipgrade_id === est.zipgrade_id) + 1;
              const pNivel = sortedNivel.findIndex(t => t.zipgrade_id === est.zipgrade_id) + 1;
              const tNivel = sortedNivel.length;
              const html = construirHTMLBoletin(est, puestoGrupo, estudiantesGrupo.length, puestosMaterias, config, historicosMap[est.zipgrade_id], pNivel, tNivel);
              const materiasContadas = config.length;
              const forzarSuperior = materiasContadas > 6;

              reportesHtml.push(`<div class="individual-report-wrapper ${forzarSuperior ? 'compact-superior' : ''}">${html}</div>`);
            });
          }

          const printWindow = window.open('', '_blank');
          const sEnd = '</' + 'script>';
          printWindow.document.write(`
          <html>
            <head>
              <title>Reportes Masivos ${desc} - Sede ${sede}</title>
              <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
              <script src="https://cdn.jsdelivr.net/npm/chart.js">${sEnd}
              <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0">${sEnd}
              <style>
                @page { size: letter portrait; margin: 4mm; }
                body { margin: 0; padding: 0; background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: 'Outfit', sans-serif; }
                .individual-report-wrapper { 
                  width: 100%;
                  height: 135mm;
                  box-sizing: border-box;
                  overflow: hidden;
                  border-bottom: 1px dashed #cbd5e1;
                }
                .report-card { 
                  zoom: 0.85;
                  width: 100% !important;
                  max-width: 100% !important;
                }
                .chart-container { height: 55px !important; }
                .individual-report-wrapper:nth-child(2n) { border-bottom: none; }
                @media print {
                  .individual-report-wrapper { page-break-inside: avoid; }
                  .individual-report-wrapper:nth-child(2n) { page-break-after: always; }
                }
              </style>
            </head>
            <body>
              ${reportesHtml.join('')}
              <script>
                const historicosData = JSON.parse(decodeURIComponent("${encodeURIComponent(JSON.stringify(historicosMap))}"));
                const currentP = ${parseInt(currentPeriodo) || 1};
                function getValoration(p) {
                  if (p >= 91) return { label: 'Superior', nivel: 'N4', color: '#7e22ce' };
                  if (p >= 71) return { label: 'Alto', nivel: 'N3', color: '#15803d' };
                  if (p >= 51) return { label: 'Básico', nivel: 'N2', color: '#b45309' };
                  return { label: 'Bajo', nivel: 'N1', color: '#b91c1c' };
                }
                function initCharts() {
                  try {
                    Object.keys(historicosData).forEach(zipId => {
                      const histAll = historicosData[zipId];
                      const hist = histAll.filter(h => h.periodo <= currentP).sort((a,b) => a.periodo - b.periodo);
                      if (!hist || hist.length < 1) return;
                      const canvas = document.getElementById('chart-tendencia-' + zipId);
                      if (!canvas) return;
                      new Chart(canvas, {
                        type: 'line', plugins: [ChartDataLabels],
                        data: {
                          labels: hist.map(h => h.periodo === 3 ? 'EF' : 'E' + h.periodo),
                          datasets: [{
                            data: hist.map(h => Math.round(h.porcentaje)),
                            borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)',
                            pointBackgroundColor: hist.map(h => getValoration(Math.round(h.porcentaje)).color),
                            pointRadius: 5, borderWidth: 2, tension: 0.3, fill: true
                          }]
                        },
                        options: {
                          responsive: true, maintainAspectRatio: false, animation: false,
                          plugins: { legend: { display: false }, datalabels: { align: 'top', font: { weight: 'bold', size: 9 } } },
                          scales: { y: { display: false, min: 0, max: 115 }, x: { grid: { display: false }, ticks: { font: { size: 9 } } } }
                        }
                      });
                    });
                  } catch(e) { console.error(e); }
                }
                window.onload = () => {
                  initCharts();
                  setTimeout(() => window.print(), 1000);
                };
              ${sEnd}
            </body>
          </html>
        `);
          printWindow.document.close();
        } catch (e) {
          console.error("Error en impresión masiva de sede:", e);
          alert("Ocurrió un error: " + e.message);
        }
        showLoading(false);
      }

      // --- LÓGICA DE ESTADÍSTICAS ---
      async function cargarEstadisticas() {
        showLoading(true);
        try {
          const { data, error } = await supabaseClient.from('eval_estudiantes_notas')
            .select('*')
            .eq('periodo', currentPeriodo);

          if (error) throw error;
          let dataTemp = data || [];

          if (dataTemp.length === 0 && currentPeriodo === 2) {
            const { data: fallbackData } = await supabaseClient.from('eval_estudiantes_notas').select('*').eq('periodo', 1);
            if (fallbackData && fallbackData.length > 0) dataTemp = fallbackData;
          }

          dataPeriodoActual = dataTemp;
          dataTodoPeriodo = dataTemp; // Guardar copia completa antes de cualquier filtro

          if (dataPeriodoActual.length === 0) {
            alert("No hay datos suficientes para generar estadísticas en este periodo.");
            showLoading(false);
            return;
          }

          // 1. Poblar selectores del Dashboard
          let gruposUnicos = [...new Set(dataPeriodoActual.map(d => extraerGrupo(d.zipgrade_id)))]
            .filter(g => extraerGradoBase(g) > 0);

          // --- Filtro de Privacidad: Solo mostrar grupos permitidos ---
          if (currentRole !== 'superadmin') {
            const assignedLower = (window.assignedGrade || "").toString().toLowerCase();
            const gBaseAssigned = extraerGradoBase(window.assignedGrade);
            const esDePrimaria = assignedLower === "primaria" || (gBaseAssigned >= 1 && gBaseAssigned <= 5);
            const mySede = window.userSede || 'Central';

            if (currentRole === 'admin') {
              gruposUnicos = gruposUnicos.filter(g => detectarSede(g) === mySede);
              if (esDePrimaria && mySede === 'Central') {
                gruposUnicos = gruposUnicos.filter(g => ['301', '401', '501'].includes(g.toString()));
              }
            } else {
              // Lectores (Docentes)
              const direccion = window.assignedGroups || [];
              const dictan = userPermissions
                .filter(p => p.tipo === 'ASIGNACION')
                .map(p => p.grado.toString());

              gruposUnicos = gruposUnicos.filter(g => {
                const gBase = extraerGradoBase(g);
                const hasPerm = dictan.some(d => d === g.toString() || d === gBase.toString()) ||
                  direccion.some(d => d === g.toString() || d === gBase.toString());

                // RESTRICCIÓN ADICIONAL CENTRAL PRIMARIA
                if (esDePrimaria && mySede === 'Central') {
                  return ['301', '401', '501'].includes(g.toString()) && hasPerm;
                }
                return hasPerm;
              });
            }
          }
          // ----------------------------------------------------------

          gruposUnicos.sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

          const gradosUnicos = [...new Set(gruposUnicos.map(g => extraerGradoBase(g)))]
            .sort((a, b) => a - b);

          const selAsig = $('est-sel-grado');
          if (selAsig) {
            selAsig.innerHTML = gruposUnicos.map(g => `<option value="${g}">${g}</option>`).join('');
          }

          const selComp = $('comp-sel-grado');
          if (selComp) {
            selComp.innerHTML = gradosUnicos.map(g => `<option value="${g}">${g}°</option>`).join('');
          }

          // 2. Gráfico: Promedio Detallado por Grupo (Grados)
          const promediosGrado = {};
          const conteoGrado = {};
          dataPeriodoActual.forEach(d => {
            const g = extraerGradoBase(extraerGrupo(d.zipgrade_id));
            if (!promediosGrado[g]) { promediosGrado[g] = 0; conteoGrado[g] = 0; }
            promediosGrado[g] += (d.porcentaje || 0);
            conteoGrado[g]++;
          });

          const labelsG = Object.keys(promediosGrado).sort((a, b) => a - b);
          const dataG = labelsG.map(l => Math.round(promediosGrado[l] / conteoGrado[l]));

          if (chartGrados) chartGrados.destroy();
          const ctxG = $('chart-grados').getContext('2d');
          chartGrados = new Chart(ctxG, {
            type: 'bar',
            plugins: [ChartDataLabels],
            data: {
              labels: labelsG.map(l => l + "°"),
              datasets: [{
                label: 'Promedio General',
                data: dataG,
                backgroundColor: '#4f46e5',
                borderRadius: 8
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                datalabels: { color: '#fff', font: { weight: 'bold', size: 16 }, anchor: 'end', align: 'bottom', formatter: v => v }
              },
              scales: { y: { min: 0, max: 100, ticks: { callback: v => v } }, x: { ticks: { color: '#000', font: { weight: 'bold', size: 14 } } } }
            }
          });

          // 3. Inicializar sub-gráficos
          actualizarGraficoAsignaturas();
          actualizarGraficoNivelAsignaturas();

        } catch (error) {
          console.error("Error al cargar estadísticas:", error);
        } finally {
          showLoading(false);
        }
      }

      function actualizarGraficoAsignaturas() {
        const grupo = $('est-sel-grado').value;
        if (!grupo) return;

        const estudiantes = dataPeriodoActual.filter(d => extraerGrupo(d.zipgrade_id) === grupo);
        const gNum = extraerGradoBase(grupo);
        let mKey = '6-9';
        if (gNum <= 4) mKey = '3-4'; else if (gNum === 5) mKey = '5'; else if (gNum >= 10) mKey = '10-11';
        const config = MATRIZ_RANGOS[mKey];

        const labels = config.map(c => c.label);
        const data = config.map(subj => {
          let suma = 0;
          let validos = 0;
          estudiantes.forEach(est => {
            let ok = 0;
            for (let i = subj.start; i <= subj.end; i++) { if (est.respuestas && est.respuestas[i] === 1) ok++; }
            suma += Math.round((ok / (subj.end - subj.start + 1)) * 100);
            validos++;
          });
          return validos > 0 ? Math.round(suma / validos) : 0;
        });

        if (chartMaterias) chartMaterias.destroy();
        const ctxM = $('chart-materias').getContext('2d');
        chartMaterias = new Chart(ctxM, {
          type: 'bar',
          plugins: [ChartDataLabels],
          data: {
            labels: labels,
            datasets: [{
              data: data,
              backgroundColor: labels.map(l => obtenerColorAsignatura(l)),
              borderRadius: 8
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              datalabels: { color: '#1e293b', font: { weight: 'bold', size: 16 }, anchor: 'end', align: 'right', formatter: v => v }
            },
            scales: { x: { min: 0, max: 100 }, y: { ticks: { color: '#000', font: { weight: 'bold', size: 14 } } } }
          }
        });
      }

      function actualizarGraficoNivelAsignaturas() {
        const gBase = parseInt($('comp-sel-grado').value);
        if (!gBase) return;

        // === DEBUG TEMPORAL ===
        console.log('[COMP] total en fuente:', (dataTodoPeriodo && dataTodoPeriodo.length > 0) ? dataTodoPeriodo.length : dataPeriodoActual.length);
        console.log('[COMP] grado seleccionado:', gBase);
        // === FIN DEBUG ===

        // 1. Filtrar estudiantes del nivel usando TODOS los datos del periodo (sin filtro de permisos)
        const fuente = (dataTodoPeriodo && dataTodoPeriodo.length > 0) ? dataTodoPeriodo : dataPeriodoActual;
        const estudiantesNivel = fuente.filter(d => extraerGradoBase(extraerGrupo(d.zipgrade_id)) === gBase);
        console.log('[COMP] estudiantesNivel.length para grado', gBase, ':', estudiantesNivel.length);

        // === DEBUG: zipgrade_ids del grado específico ===
        const muestraGrado = estudiantesNivel.slice(0, 15).map(d => ({
          id: d.zipgrade_id,
          grupo: extraerGrupo(d.zipgrade_id),
          sede: detectarSede(extraerGrupo(d.zipgrade_id))
        }));
        console.table(muestraGrado);
        // ================================================

        // 2. Identificar sedes únicas en este nivel
        const sedesUnicas = [...new Set(estudiantesNivel.map(d => detectarSede(extraerGrupo(d.zipgrade_id))))]
          .filter(s => s)
          .sort((a, b) => a.localeCompare(b));
        console.log('[COMP] sedesUnicas:', sedesUnicas);


        if (sedesUnicas.length === 0) return;

        // 3. Determinar configuración de materias
        let mKey = '6-9';
        if (gBase <= 4) mKey = '3-4'; else if (gBase === 5) mKey = '5'; else if (gBase >= 10) mKey = '10-11';
        const config = MATRIZ_RANGOS[mKey];
        const labels = config.map(c => c.label);

        // 4. Colores institucionales por sede
        const COLORES_SEDE = {
          'Central':    '#4f46e5',
          'Yanaconas':  '#10b981',
          'Sendero':    '#f59e0b',
          'Pisoje Bajo':'#ef4444',
          'Pueblillo':  '#06b6d4'
        };

        // 5. Crear datasets: uno por cada SEDE
        const datasets = sedesUnicas.map(sede => {
          const estudiantesSede = estudiantesNivel.filter(d => detectarSede(extraerGrupo(d.zipgrade_id)) === sede);
          const data = config.map(subj => {
            let suma = 0;
            let count = 0;
            estudiantesSede.forEach(est => {
              let ok = 0;
              for (let i = subj.start; i <= subj.end; i++) {
                if (est.respuestas && est.respuestas[i] === 1) ok++;
              }
              suma += Math.round((ok / (subj.end - subj.start + 1)) * 100);
              count++;
            });
            return count > 0 ? Math.round(suma / count) : 0;
          });

          return {
            label: sede,
            data: data,
            backgroundColor: COLORES_SEDE[sede] || '#6366f1',
            borderRadius: 5,
            borderWidth: 1,
            borderColor: 'white'
          };
        });

        if (chartComparativo) chartComparativo.destroy();
        const ctxC = $('chart-comparativo-grupos').getContext('2d');
        chartComparativo = new Chart(ctxC, {
          type: 'bar',
          plugins: [ChartDataLabels],
          data: { labels: labels, datasets: datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: 'top', labels: { font: { size: 10, weight: 'bold' }, usePointStyle: true } },
              datalabels: {
                color: '#fff',
                font: { weight: 'bold', size: 14 },
                anchor: 'center',
                align: 'center',
                formatter: v => v > 0 ? v : ''
              },
              tooltip: {
                mode: 'index',
                intersect: false,
                callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y }
              }
            },
            scales: {
              y: {
                min: 0, max: 100,
                ticks: { font: { size: 10 }, callback: v => v },
                title: { display: true, text: 'Promedio', font: { weight: 'bold' } }
              },
              x: { ticks: { color: '#000', font: { weight: 'bold', size: 12 }, autoSkip: false, maxRotation: 45, minRotation: 0 } }
            }
          }
        });
      }
    </script>

    <script>
      window.addEventListener('load', () => {
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
          navigator.serviceWorker.register('sw.js')
            .then(reg => {
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    window.location.reload();
                  }
                };
              };
            }).catch(err => console.log("PWA Service Worker inactivo en modo local (file://)."));
        }
      });

      if (localStorage.getItem('app_version') !== CURRENT_APP_VERSION) {
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) registration.unregister();
          }).catch(e => console.log(e));
        }
        if (typeof caches !== 'undefined') {
          caches.keys().then(names => {
            for (let name of names) caches.delete(name);
          }).catch(e => console.log(e));
        }
        localStorage.setItem('app_version', CURRENT_APP_VERSION);
        setTimeout(() => window.location.reload(), 1000);
      }

      window.addEventListener('DOMContentLoaded', () => {
        if (typeof checkSession === 'function') {
          checkSession().then(() => {
            if (typeof switchMainTab === 'function') {
              switchMainTab('analisis');
            }
          });
        }
      });
    </script>
